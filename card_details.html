<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      * {
        box-sizing: border-box;
      }
      html {
        height: 100%;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #262626; /* neutral-800 */
      }
      .frame-root {
        width: 360px;
        height: 800px;
        flex-shrink: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #0c101f 0%, #131b34 40%);
      }
      .frame-root__header-img {
        width: 360px;
        max-width: 100%;
        height: auto;
        display: block;
        flex-shrink: 0;
        vertical-align: top;
      }
      .frame-root__mycards-header {
        width: 360px;
        flex-shrink: 0;
        background-color: transparent;
        line-height: 0;
      }
      .frame-root__mycards-svg {
        display: block;
        width: 360px;
        height: 55px;
      }
      .frame-root__product-tabs {
        padding: 8px 0 12px;
        background: transparent;
        min-width: 0;
      }
      .frame-root__product-tabs-scroll {
        width: 100%;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        padding: 0 12px;
      }
      .frame-root__product-tabs-scroll::-webkit-scrollbar {
        display: none;
      }
      .frame-root__product-tabs-row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        gap: 8px;
        width: max-content;
      }
      .product-chip {
        box-sizing: border-box;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        white-space: nowrap;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
      }
      .product-chip--active {
        background: #fff;
        color: #0c101f;
      }
      .product-chip:not(.product-chip--active) {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .product-chip--w90 {
        width: 90px;
      }
      .product-chip--w86 {
        width: 86px;
      }
      .product-chip--w70 {
        width: 70px;
      }
      .product-chip--w115 {
        width: 115px;
      }
      /* Cards layer — horizontally scrollable rail (360 frame: ~86% width card, centered + peek) */
      .frame-root__cards {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: transparent;
        min-width: 0;
      }
      .frame-root__cards-scroll {
        width: 100%;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        scroll-snap-type: x mandatory;
        /* (360 − 308) / 2 → card centers; ~12px card gap shows sliver of next card */
        padding: 10px 26px 0;
      }
      .frame-root__cards-scroll::-webkit-scrollbar {
        display: none;
      }
      .frame-root__cards-row {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: flex-start;
        gap: 12px;
        width: max-content;
      }
      .bank-card {
        position: relative;
        flex: 0 0 auto;
        width: 308px;
        height: 182px;
        aspect-ratio: 308 / 182;
        border-radius: 14px;
        scroll-snap-align: center;
        scroll-snap-stop: always;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        background: #0c101f;
        margin: 0;
        padding: 0;
        border: none;
        cursor: pointer;
        font: inherit;
        color: inherit;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
        text-align: left;
      }
      .bank-card:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.55);
        outline-offset: 3px;
      }
      .bank-card:active {
        transform: scale(0.985);
      }
      .bank-card__img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
      }
      .frame-root__cards-below {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 16px;
        padding: 0 26px 18px;
        line-height: 0;
      }
      .frame-root__card-dots-svg {
        display: block;
        flex-shrink: 0;
        width: 42px;
        height: auto;
      }
      .frame-root__card-dot {
        fill: #4f4f4f;
        cursor: pointer;
        transition: fill 0.22s ease;
      }
      .frame-root__card-dot--active {
        fill: #d9d9d9;
      }
      @media (prefers-reduced-motion: reduce) {
        .frame-root__card-dot {
          transition: none;
        }
      }
      /* Card settings — tile grid, then “Card Settings” row under icons */
      .frame-root__card-settings {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
        background: transparent;
        position: relative;
        z-index: 1;
      }
      .frame-root__card-settings__toggle {
        flex-shrink: 0;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
        margin: 0;
        margin-top: -8px;
        padding: 10px 20px 14px;
        border: none;
        background: transparent;
        color: #9ca3af;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 11px;
        font-weight: 400;
        line-height: 1.25;
        letter-spacing: 0.01em;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
      }
      .frame-root__card-settings__toggle:hover {
        color: #b4b9c2;
      }
      .frame-root__card-settings__toggle:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: -2px;
      }
      .frame-root__card-settings__chevron {
        display: block;
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        color: currentColor;
        transition: transform 0.3s ease;
      }
      .frame-root__card-settings__chevron svg {
        display: block;
        width: 14px;
        height: 14px;
      }
      .frame-root__card-settings--open .frame-root__card-settings__chevron {
        transform: rotate(180deg);
      }
      .frame-root__card-settings--open .frame-root__card-settings__toggle {
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .frame-root__card-settings__panel {
        flex-shrink: 0;
        max-height: 0;
        overflow: hidden;
        background: transparent;
        transition: max-height 0.38s ease;
      }
      .frame-root__card-settings--open .frame-root__card-settings__panel {
        max-height: 220px;
      }
      .frame-root__card-settings__panel-inner {
        padding: 16px 16px 12px;
        box-sizing: border-box;
      }
      .frame-root__card-settings__figure {
        position: relative;
        width: 100%;
        max-width: 326px;
        margin: 0 auto;
        aspect-ratio: 326 / 140;
      }
      .frame-root__card-settings__art {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        vertical-align: top;
        pointer-events: none;
        user-select: none;
      }
      .frame-root__card-settings__hits {
        position: absolute;
        inset: 0;
      }
      .frame-root__card-settings__hit {
        position: absolute;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 14px;
        background: transparent;
        cursor: pointer;
        appearance: none;
        -webkit-tap-highlight-color: transparent;
      }
      .frame-root__card-settings__hit:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.55);
        outline-offset: 2px;
      }
      .frame-root__card-settings__hit--1 {
        left: 0;
        top: 0;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--2 {
        left: 33.333%;
        top: 0;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--3 {
        left: 66.666%;
        top: 0;
        width: 33.334%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--4 {
        left: 0;
        top: 52.8571%;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--5 {
        left: 33.333%;
        top: 52.8571%;
        width: 33.333%;
        height: 47.1429%;
      }
      .frame-root__card-settings__hit--6 {
        left: 66.666%;
        top: 52.8571%;
        width: 33.334%;
        height: 47.1429%;
      }
      @media (prefers-reduced-motion: reduce) {
        .frame-root__card-settings__panel,
        .frame-root__card-settings__chevron {
          transition: none;
        }
      }
      /* Bottom sheet–style panel under cards */
      .content {
        flex: 1;
        min-height: 0;
        min-width: 0;
        width: 100%;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        text-align: left;
        background: #fff;
        border-radius: 24px 24px 0 0;
        overflow: hidden;
      }
      .content__accent {
        flex: 0 0 auto;
        height: 3px;
        border-radius: 24px 24px 0 0;
        background: linear-gradient(
          90deg,
          #e8928a 0%,
          #4a9ef5 50%,
          #e8928a 100%
        );
      }
      .content__body {
        flex: 1;
        min-height: 0;
        min-width: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        padding-top: 20px;
        padding-left: 0;
        padding-right: 0;
        padding-bottom: 24px;
        box-sizing: border-box;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .content__body::-webkit-scrollbar {
        display: none;
      }
      .content1 {
        flex-shrink: 0;
        align-self: stretch;
        width: 100%;
        margin-left: 0;
        margin-right: 0;
        min-width: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
      }
      .content1__options {
        flex-shrink: 0;
        width: auto;
        min-width: 0;
        margin-left: 16px;

      .content1__options-img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      .content1__due {
        flex-shrink: 0;
        width: auto;
        min-width: 0;
        margin-left: 16px;
        margin-right: 16px;
        box-sizing: border-box;
      }
      .content1__due-img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      .content1__explore {
        flex-shrink: 0;
        align-self: stretch;
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 16px;
        overflow: visible;
      }
      .content1__explore-heading {
        flex-shrink: 0;
        width: auto;
        min-width: 0;
        margin-left: 16px;
        margin-right: 16px;
        box-sizing: border-box;
      }
      .content1__explore-title {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 400;
        line-height: 1;
        color: #949a9f;
        text-transform: uppercase;
      }
      /* Banner Option 2 — full-width horizontal rail under explore (peek / scroll) */
      .content1__explore-banner2 {
        flex-shrink: 0;
        min-width: 0;
        width: 100%;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        padding-left: 8px;
        padding-right: 16px;
        box-sizing: border-box;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .content1__explore-banner2::-webkit-scrollbar {
        display: none;
      }
      .content1__explore-banner2-img {
        display: block;
        width: 520px;
        height: auto;
        max-width: none;
        /* SVG: ~36px empty above cards; x≈3 inset + padding 8px → 8px gap frame→first card */
        margin: -36px 0 0 -3px;
      }
      .content1__emi {
        flex-shrink: 0;
        width: auto;
        min-width: 0;
        margin-left: 16px;
        margin-right: 16px;
        box-sizing: border-box;
      }
      .content1__emi-img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      /* content2: heading + cards rail both inset 16px L/R (via section margin) */
      .content2 {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        width: auto;
        max-width: 100%;
        min-width: 0;
        margin: 8px 16px 16px 16px;
        padding: 0;
        box-sizing: border-box;
        align-self: stretch;
        overflow: visible;
      }
      .content2__promo-head {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        min-width: 0;
        max-width: 100%;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .content2__deals-line {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.25;
        color: #949a9f;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }
      .content2__view-all {
        flex-shrink: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.25;
        color: #1c3fca;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }
      .content2__view-all:hover {
        text-decoration: underline;
      }
      .content2__view-all:focus-visible {
        outline: 2px solid #1c3fca;
        outline-offset: 2px;
        border-radius: 2px;
      }
      .content2__cards-scroll {
        flex-shrink: 0;
        min-width: 0;
        width: calc(100% + 32px);
        max-width: none;
        margin-left: -16px;
        margin-right: -16px;
        padding: 0 16px 4px 16px;
        box-sizing: border-box;
        align-self: stretch;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
        touch-action: pan-x;

        -ms-overflow-style: none;
      }
      .content2__cards-scroll::-webkit-scrollbar {
        display: none;

      .content2__cards-crop {
        display: flex;
        flex-direction: row;

      }
      .content2__card-img {

        width: 268px;
        height: auto;
        flex-shrink: 0;

      }

  <body>
    <div class="frame-root">
      <img
        class="frame-root__header-img"
        src="assets/ios-browser-header.png"
        alt=""
        width="360"
        draggable="false"
      />
      <div class="frame-root__mycards-header">
        <img
          class="frame-root__mycards-svg"
          src="assets/mycards-app-header.svg"
          alt=""
          width="360"
          height="55"
          draggable="false"
        />
        <div class="frame-root__product-tabs">
          <div class="frame-root__product-tabs-scroll">
            <div class="frame-root__product-tabs-row" role="tablist">
            <button
              type="button"
              class="product-chip product-chip--active product-chip--w90"
              role="tab"
              aria-selected="true"
            >
              Credit Card
            </button>
            <button
              type="button"
              class="product-chip product-chip--w86"
              role="tab"
              aria-selected="false"
            >
              Debit Card
            </button>
            <button
              type="button"
              class="product-chip product-chip--w70"
              role="tab"
              aria-selected="false"
            >
              FastTag
            </button>
            <button
              type="button"
              class="product-chip product-chip--w115"
              role="tab"
              aria-selected="false"
            >
              Consumer Loan
            </button>
            </div>
          </div>
        </div>
      </div>
      <div class="frame-root__cards" aria-label="Your cards">
        <div class="frame-root__cards-scroll">
          <div class="frame-root__cards-row">
            <button
              type="button"
              class="bank-card"
              aria-label="Swiggy Credit Card, open details"
            >
              <img

    <script>
      (function () {
        var scrollEl = document.querySelector(".frame-root__cards-scroll");
        var cards = document.querySelectorAll(".frame-root__cards .bank-card");
        if (!scrollEl || !cards.length) return;

        var dotsBelow = document.getElementById("frame-root__cards-below");
        var dotRects = document.querySelectorAll(".frame-root__card-dot");

        var smoothScroll =
          !window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        var scrollSyncRaf = null;
        function scheduleDotsSync() {
          if (scrollSyncRaf != null) return;
          scrollSyncRaf = requestAnimationFrame(function () {
            scrollSyncRaf = null;
            syncDotsWithScroll();
          });
        }

        function indexOfCardNearestScrollCenter() {
          var scrollRect = scrollEl.getBoundingClientRect();
          var mid = scrollRect.left + scrollRect.width / 2;
          var best = 0;
          var bestDist = Infinity;
          for (var i = 0; i < cards.length; i++) {
            var r = cards[i].getBoundingClientRect();
            var c = r.left + r.width / 2;
            var d = Math.abs(c - mid);
            if (d < bestDist) {
              bestDist = d;
              best = i;
            }
          }
          return best;
        }

        function setActiveDot(index) {
          var max = Math.min(dotRects.length, cards.length) - 1;
          var i = Math.max(0, Math.min(index, max));
          dotRects.forEach(function (el, j) {
            el.classList.toggle("frame-root__card-dot--active", j === i);
          });
          if (dotsBelow) {
            dotsBelow.setAttribute(
              "aria-label",
              "Card " + (i + 1) + " of " + cards.length
            );
          }
        }

        function syncDotsWithScroll() {
          setActiveDot(indexOfCardNearestScrollCenter());
        }

        function centerCardHorizontally(card) {
          var cardRect = card.getBoundingClientRect();
          var scrollRect = scrollEl.getBoundingClientRect();
          var cardMid = cardRect.left + cardRect.width / 2;
          var scrollMid = scrollRect.left + scrollRect.width / 2;
          var delta = cardMid - scrollMid;
          scrollEl.scrollBy({
            left: delta,
            behavior: smoothScroll ? "smooth" : "auto",
          });
        }

        cards.forEach(function (card) {
          card.addEventListener("click", function () {
            centerCardHorizontally(card);
          });
        });

        dotRects.forEach(function (dot, i) {
          dot.addEventListener("click", function (e) {
            e.stopPropagation();
            if (cards[i]) {
              centerCardHorizontally(cards[i]);
            }
          });
        });

        scrollEl.addEventListener("scroll", scheduleDotsSync, { passive: true });
        window.addEventListener("resize", syncDotsWithScroll);

        requestAnimationFrame(syncDotsWithScroll);
      })();
    </script>
    <script>
      (function () {
        var row = document.querySelector(".frame-root__product-tabs-row");
        if (!row) return;
        var chips = row.querySelectorAll("button.product-chip");
        chips.forEach(function (chip) {
          chip.addEventListener("click", function () {
            chips.forEach(function (c) {
              c.classList.remove("product-chip--active");
              c.setAttribute("aria-selected", "false");
            });
            chip.classList.add("product-chip--active");
            chip.setAttribute("aria-selected", "true");
          });
        });
      })();
    </script>
    <script>
      (function () {
        var root = document.getElementById("frame-root-card-settings");
        var toggle = document.getElementById("card-settings-toggle");
        var panel = document.getElementById("card-settings-panel");
        if (!root || !toggle || !panel) return;

        function applyOpen(open) {
          root.classList.toggle("frame-root__card-settings--open", open);
          toggle.setAttribute("aria-expanded", open ? "true" : "false");
          panel.setAttribute("aria-hidden", open ? "false" : "true");
          if ("inert" in panel) {
            panel.inert = !open;
          }
        }

        toggle.addEventListener("click", function () {
          applyOpen(!root.classList.contains("frame-root__card-settings--open"));
        });

        applyOpen(root.classList.contains("frame-root__card-settings--open"));
      })();
    </script>
